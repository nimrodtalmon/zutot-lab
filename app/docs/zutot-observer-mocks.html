<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zutot Observer — mocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:   #f7f3eb;
    --paper-2: #efe9dc;
    --ink:     #1a1a1a;
    --ink-2:   #3a3a38;
    --muted:   #8a857c;
    --rule:    #d4cdbc;
    --rule-2:  #c4bca8;

    --dot-bad:    #7c3aed;
    --dot-q:      #2563eb;
    --dot-run:    #c97f17;
    --dot-fresh:  #2f9e44;
    --dot-idle:   #b8b1a3;

    --q-bg: #eef2ff;
    --q-br: #2563eb;

    --serif: "Newsreader", Georgia, "Iowan Old Style", serif;
    --mono:  "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #ebe5d6; color: var(--ink); font-family: var(--serif); }
  body { padding: 32px 16px 96px; }

  /* PAGE HEADER */
  .page-head {
    max-width: 1280px; margin: 0 auto 28px; padding: 0 12px;
    display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
  }
  .page-head h1 { font-size: 22px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
  .page-head .sub { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  .section-label {
    max-width: 1280px; margin: 24px auto 8px; padding: 0 12px;
    font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted);
  }

  /* LAPTOP FRAME */
  .laptop-frame {
    max-width: 1280px; margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--rule-2);
    border-radius: 14px;
    box-shadow: 0 18px 38px -22px rgba(0,0,0,0.28), 0 2px 0 #d4cdbc;
    overflow: hidden;
    position: relative;
  }
  .laptop-chrome {
    height: 28px; background: var(--paper-2);
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; padding: 0 12px; gap: 6px;
  }
  .laptop-chrome .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #d4cdbc;
  }
  .laptop-chrome .url {
    margin-left: 12px; font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .laptop-body {
    display: grid; grid-template-columns: 320px 1fr;
    min-height: 640px;
    position: relative;
  }

  /* LEFT PANE */
  .pane-left {
    border-right: 1px solid var(--rule);
    background: var(--paper);
  }
  .pane-left .header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
  }
  .pane-left .header .title {
    font-family: var(--mono); font-size: 12px; color: var(--ink-2); font-weight: 500;
  }
  .pane-left .header .folder {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .thread-row {
    display: grid; grid-template-columns: 22px 1fr; gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 0.12s ease;
    position: relative;
  }
  .thread-row:hover { background: rgba(0,0,0,0.025); }
  .thread-row.selected { background: var(--paper-2); }
  .thread-row.selected::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--ink);
  }
  .thread-row .dot {
    width: 10px; height: 10px; border-radius: 50%;
    margin-top: 7px; align-self: start;
    box-shadow: 0 0 0 2px var(--paper);
  }
  .thread-row.selected .dot { box-shadow: 0 0 0 2px var(--paper-2); }
  .dot.bad   { background: var(--dot-bad); }
  .dot.q     { background: var(--dot-q); }
  .dot.run   { background: var(--dot-run); }
  .dot.fresh { background: var(--dot-fresh); }
  .dot.idle  { background: var(--dot-idle); }

  .thread-row .slug {
    font-family: var(--serif); font-size: 15.5px; line-height: 1.25; color: var(--ink);
    font-weight: 500; letter-spacing: -0.005em;
  }
  .thread-row .meta {
    margin-top: 4px;
    font-family: var(--mono); font-size: 10.5px; color: var(--muted);
    display: flex; gap: 10px;
  }
  .thread-row .meta .counts { color: var(--ink-2); }

  /* RIGHT PANE */
  .pane-right {
    padding: 22px 28px 32px;
    background: var(--paper);
    overflow: auto;
  }
  .thread-header {
    display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
    padding-bottom: 12px; border-bottom: 1px solid var(--rule);
  }
  .thread-header h2 {
    margin: 0; font-family: var(--serif); font-weight: 500; font-size: 26px;
    letter-spacing: -0.015em;
  }
  .thread-header .actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    font-family: var(--mono); font-size: 11.5px;
    padding: 6px 10px; border: 1px solid var(--rule-2);
    background: var(--paper-2); color: var(--ink-2);
    border-radius: 6px; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: #e5dec9; }
  .btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn.primary:hover { background: #000; }

  .status-line {
    margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--muted);
  }

  .section {
    margin-top: 22px;
  }
  .section-h {
    font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-h .since {
    text-transform: none; letter-spacing: 0; font-size: 11px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--q-bg);
    border-left: 3px solid var(--q-br);
    border-top: 1px solid #dbe3fb;
    border-right: 1px solid #dbe3fb;
    border-bottom: 1px solid #dbe3fb;
    padding: 14px 16px 14px 18px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .question-card .from {
    font-family: var(--mono); font-size: 11px; color: #4338ca; margin-bottom: 8px;
  }
  .question-card .body {
    font-family: var(--serif); font-size: 15px; line-height: 1.45;
  }
  .question-card .footer {
    margin-top: 12px; display: flex; justify-content: flex-end;
  }

  /* JOB CARD */
  .job-card {
    border: 1px solid var(--rule);
    background: var(--paper);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .job-card:hover { background: var(--paper-2); border-color: var(--rule-2); }
  .job-card .top {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .job-card .slug {
    font-family: var(--mono); font-size: 12.5px; color: var(--ink); font-weight: 500;
  }
  .job-card .meta {
    font-family: var(--mono); font-size: 10.5px; color: var(--muted);
  }
  .job-card.running { border-left: 3px solid var(--dot-run); padding-left: 11px; }
  .job-card.done    { border-left: 3px solid var(--dot-fresh); padding-left: 11px; }

  /* PROGRESS LOG */
  .progress {
    margin-top: 8px;
    font-family: var(--mono); font-size: 11.5px; color: var(--ink-2);
    background: rgba(0,0,0,0.025);
    border-radius: 4px;
    padding: 8px 10px;
    line-height: 1.55;
  }
  .progress .line { white-space: pre; }
  .progress .ts { color: var(--muted); }

  /* NOTES */
  .notes {
    font-family: var(--serif); font-size: 15px; line-height: 1.6;
    background: var(--paper); padding: 0;
  }
  .notes ul { margin: 4px 0 0 0; padding-left: 18px; }
  .notes li { margin-bottom: 4px; }
  .notes li .date { font-family: var(--mono); font-size: 11.5px; color: var(--muted); margin-right: 6px; }

  /* PENDING LIST */
  .pending-collapse summary {
    cursor: pointer; list-style: none; outline: none;
    font-family: var(--mono); font-size: 11.5px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
  }
  .pending-collapse summary::-webkit-details-marker { display: none; }
  .pending-collapse summary::before { content: "▸"; }
  .pending-collapse[open] summary::before { content: "▾"; }
  .pending-list { list-style: none; padding: 0; margin: 0; }
  .pending-list li {
    border: 1px solid var(--rule);
    background: var(--paper);
    border-radius: 6px;
    padding: 9px 12px; margin-bottom: 6px;
    font-family: var(--mono); font-size: 12.5px; color: var(--ink-2);
    cursor: pointer;
  }
  .pending-list li:hover { background: var(--paper-2); }

  /* OVERLAY */
  .overlay-backdrop {
    position: absolute; inset: 0;
    background: rgba(40, 35, 25, 0.42);
    backdrop-filter: blur(2px);
    display: none;
    z-index: 5;
  }
  .overlay-backdrop.open { display: block; }
  .overlay {
    position: absolute; top: 28px; right: 32px; left: 352px; bottom: 32px;
    background: var(--paper);
    border: 1px solid var(--rule-2);
    border-radius: 10px;
    box-shadow: 0 24px 60px -20px rgba(0,0,0,0.45);
    display: none; z-index: 10;
    overflow: hidden;
    flex-direction: column;
  }
  .overlay.open { display: flex; }
  .overlay-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px; border-bottom: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .overlay-head .title {
    font-family: var(--mono); font-size: 13px; color: var(--ink); font-weight: 500;
  }
  .overlay-head .state-pill {
    font-family: var(--mono); font-size: 10.5px;
    padding: 3px 8px; border-radius: 99px;
    background: var(--paper); border: 1px solid var(--rule);
    color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .overlay-head .close {
    background: transparent; border: none; cursor: pointer;
    font-size: 18px; color: var(--ink-2); padding: 4px 8px; border-radius: 4px;
  }
  .overlay-head .close:hover { background: var(--paper); }
  .overlay-body { overflow: auto; padding: 18px 22px 28px; }
  .overlay-body .kv {
    font-family: var(--mono); font-size: 12px; color: var(--ink-2);
    margin-bottom: 4px;
  }
  .overlay-body .kv .k { color: var(--muted); }
  .overlay-body h3 {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted); margin: 22px 0 8px; font-weight: 500;
  }
  .overlay-body .prose {
    font-family: var(--serif); font-size: 15px; line-height: 1.55; color: var(--ink);
  }
  .overlay-body .prose p { margin: 0 0 10px; }
  .overlay-body .prose ul { margin: 8px 0; padding-left: 22px; }
  .overlay-body .prose li { margin-bottom: 4px; }

  /* MOBILE FRAME */
  .mobile-wrap {
    max-width: 1280px; margin: 0 auto; padding: 0 12px;
    display: flex; gap: 28px; justify-content: center; flex-wrap: wrap;
  }
  .phone {
    width: 360px; flex-shrink: 0;
    background: #1f1c17;
    border-radius: 38px;
    padding: 12px;
    box-shadow: 0 18px 38px -22px rgba(0,0,0,0.45);
    position: relative;
  }
  .phone-screen {
    background: var(--paper);
    border-radius: 28px;
    overflow: hidden;
    height: 680px;
    position: relative;
    display: flex; flex-direction: column;
  }
  .phone-notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 90px; height: 22px; background: #1f1c17; border-radius: 12px;
    z-index: 20;
  }
  .phone-label {
    text-align: center; margin-top: 10px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }

  /* MOBILE INTERNAL */
  .m-topbar {
    height: 52px;
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    padding-top: 18px;
  }
  .m-topbar .left { display: flex; align-items: center; gap: 8px; }
  .m-topbar .back {
    font-family: var(--mono); font-size: 13px; color: var(--ink-2);
    background: transparent; border: none; cursor: pointer; padding: 4px 6px;
  }
  .m-topbar .title {
    font-family: var(--mono); font-size: 12px; color: var(--ink-2); font-weight: 500;
  }
  .m-topbar .actions { display: flex; gap: 6px; }
  .m-topbar .icon-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--rule-2); background: var(--paper-2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
  }
  .m-screen { flex: 1; overflow: auto; }

  .m-thread-row {
    padding: 14px 16px;
    display: grid; grid-template-columns: 18px 1fr 14px; gap: 10px;
    align-items: start;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
  }
  .m-thread-row:hover { background: var(--paper-2); }
  .m-thread-row .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
  .m-thread-row .slug {
    font-family: var(--serif); font-size: 16px; line-height: 1.25; color: var(--ink);
    font-weight: 500;
  }
  .m-thread-row .meta {
    margin-top: 4px;
    font-family: var(--mono); font-size: 10.5px; color: var(--muted);
  }
  .m-thread-row .chev { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .m-thread-view { padding: 16px 16px 80px; }
  .m-thread-view h2 {
    font-family: var(--serif); font-size: 22px; font-weight: 500; margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .m-thread-view .status {
    font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 18px;
  }
  .m-next {
    position: sticky; bottom: 12px; margin: 16px 16px 0;
    background: var(--ink); color: var(--paper);
    font-family: var(--mono); font-size: 12px;
    padding: 12px; border-radius: 8px; text-align: center;
    cursor: pointer;
  }

  /* MOBILE OVERLAY */
  .m-overlay {
    position: absolute; inset: 0;
    background: var(--paper);
    display: none; flex-direction: column;
    z-index: 30;
  }
  .m-overlay.open { display: flex; }
  .m-overlay-head {
    height: 52px;
    padding: 18px 16px 0;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .m-overlay-head .title {
    font-family: var(--mono); font-size: 12.5px; color: var(--ink); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 200px;
  }
  .m-overlay-head .right { display: flex; align-items: center; gap: 8px; }
  .m-overlay-body { padding: 16px 16px 32px; overflow: auto; flex: 1; }

  /* JOB IN OVERLAY — INLINE BLOCK */
  .inline-spec {
    font-family: var(--serif); font-size: 14.5px; line-height: 1.55;
  }
  .inline-spec ol { padding-left: 22px; margin: 8px 0; }

  /* FOOTNOTE */
  .legend {
    max-width: 1280px; margin: 24px auto 0; padding: 14px 16px;
    background: var(--paper); border: 1px dashed var(--rule-2);
    border-radius: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
  }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .legend .item .dot { width: 9px; height: 9px; border-radius: 50%; }

  @media (max-width: 900px) {
    .laptop-body { grid-template-columns: 240px 1fr; }
    .pane-right { padding: 18px 18px 28px; }
    .overlay { left: 280px; right: 16px; top: 36px; bottom: 16px; }
  }
  @media (max-width: 700px) {
    .laptop-body { grid-template-columns: 180px 1fr; min-height: 540px; }
    .pane-left .header .folder { display: none; }
    .thread-row { padding: 10px 10px; }
    .thread-row .slug { font-size: 13.5px; }
    .pane-right { padding: 14px 14px 22px; }
    .thread-header h2 { font-size: 20px; }
    .overlay { left: 200px; right: 8px; top: 36px; bottom: 8px; }
    .overlay-body { padding: 14px 16px 22px; }
  }
</style>
</head>
<body>

<div class="page-head">
  <h1>Zutot Observer — interactive mocks</h1>
  <div class="sub">click threads · click job cards · ✕ closes overlay</div>
</div>

<div class="section-label">— laptop —</div>

<div class="laptop-frame">
  <div class="laptop-chrome">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span class="url">observer.zutot-lab-os</span>
  </div>

  <div class="laptop-body" id="laptop-body">

    <aside class="pane-left">
      <div class="header">
        <span class="title">Threads</span>
        <span class="folder">zutot-lab-os/</span>
      </div>
      <div id="thread-list"></div>
    </aside>

    <main class="pane-right" id="pane-right">
      <!-- populated by JS -->
    </main>

    <div class="overlay-backdrop" id="overlay-backdrop"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-head">
        <div style="display:flex; align-items:center; gap:12px;">
          <span class="title" id="overlay-title"></span>
          <span class="state-pill" id="overlay-state"></span>
        </div>
        <button class="close" id="overlay-close">✕</button>
      </div>
      <div class="overlay-body" id="overlay-body"></div>
    </div>

  </div>
</div>

<div class="section-label">— mobile —</div>

<div class="mobile-wrap">

  <div>
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="m-topbar">
          <div class="left">
            <span class="title">zutot-lab-os</span>
          </div>
          <div class="actions">
            <div class="icon-btn" title="folder">⌄</div>
          </div>
        </div>
        <div class="m-screen" id="m-list"></div>
      </div>
    </div>
    <div class="phone-label">threads list</div>
  </div>

  <div>
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-screen" style="position: relative;">
        <div class="m-topbar">
          <div class="left">
            <button class="back">‹ Threads</button>
          </div>
          <div class="actions">
            <div class="icon-btn" title="overleaf">↗</div>
            <div class="icon-btn" title="chat">💬</div>
          </div>
        </div>
        <div class="m-screen" id="m-thread"></div>
        <div class="m-overlay" id="m-overlay">
          <div class="m-overlay-head">
            <button class="back" id="m-overlay-close">‹ Back</button>
            <div class="right">
              <span class="title" id="m-overlay-title"></span>
              <span class="state-pill" id="m-overlay-state"></span>
            </div>
          </div>
          <div class="m-overlay-body" id="m-overlay-body"></div>
        </div>
      </div>
    </div>
    <div class="phone-label">thread view (tap a job to open overlay)</div>
  </div>

</div>

<div class="legend">
  <div class="item"><span class="dot" style="background: var(--dot-bad);"></span> bad (deferred)</div>
  <div class="item"><span class="dot" style="background: var(--dot-q);"></span> open question</div>
  <div class="item"><span class="dot" style="background: var(--dot-run);"></span> running</div>
  <div class="item"><span class="dot" style="background: var(--dot-fresh);"></span> fresh result</div>
  <div class="item"><span class="dot" style="background: var(--dot-idle);"></span> idle</div>
</div>

<script>

function openOverlay(jobId) {
  const d = jobDetails[jobId];
  if (!d) return;
  document.getElementById("overlay-title").textContent = jobId;
  document.getElementById("overlay-state").textContent = d.state;
  let body = `
    <div class="kv"><span class="k">thread:</span> ${d.thread}</div>
    <div class="kv"><span class="k">budget:</span> ${d.budget}</div>
    <h3>Spec</h3>
    <div class="prose inline-spec">${d.spec}</div>
  `;
  if (d.progress) {
    body += `<h3>Progress</h3><div class="progress">
      ${d.progress.map(([ts, msg]) => `<div class="line"><span class="ts">${ts}</span>  ${msg}</div>`).join("")}
    </div>`;
  }
  if (d.question) {
    body += `<h3>Open question</h3>
      <div class="question-card">
        <div class="body">${d.question}</div>
      </div>`;
  }
  if (d.result) {
    body += `<h3>Result</h3><div class="prose">${d.result}</div>`;
  }
  document.getElementById("overlay-body").innerHTML = body;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("overlay-backdrop").classList.add("open");

  // also open mobile overlay
  openMobileOverlay(jobId);
}
function closeOverlay() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("overlay-backdrop").classList.remove("open");
}
document.getElementById("overlay-close").addEventListener("click", closeOverlay);
document.getElementById("overlay-backdrop").addEventListener("click", closeOverlay);
